name: netlify-deploy-comment
description: 'Deploy static site to netlify then add PR comment'
inputs:
  netlify_auth_token:
    description: 'Netlify auth token'
    required: true
  netlify_site_id:
    description: 'Netlify site id'
    required: true
  pat_github_pr:
    description: 'Github token with PR permission'
  path:
    description: 'Path to rendered site'
    required: true
    default: '.'
  netlify_url:
    description: 'Netlify site url'
    required: true
    default: '.'

runs:
  using: "composite"
  steps:
    - uses: actions/setup-node@v5
      name: setup-node https://github.com/actions/setup-node?tab=readme-ov-file#usage
      with:
        node-version: 21
    - name: https://www.npmjs.com/package/@netlify/edge-functions-bootstrap
      run: npm i @netlify/edge-functions-bootstrap -g
      shell: bash
    - name: Install netlify cli
      run: npm install netlify-cli -g
      shell: bash
    - name: Get pull request id
      run: |
        PR_OR_MAIN=$(echo "${{ github.ref_name }}" | tr / -)
        [ "$PR_OR_MAIN" == "main" ] && DEPLOY_FLAGS=--prod || DEPLOY_FLAGS="--alias $PR_OR_MAIN"
        echo "pr_id=$PR_OR_MAIN" >> $GITHUB_ENV
        echo "deploy_flags=$DEPLOY_FLAGS" >> $GITHUB_ENV
      shell: bash

    - name: Deploy to netlify
      env:
        NETLIFY_AUTH_TOKEN: ${{ inputs.netlify_auth_token }}
        NETLIFY_SITE_ID: ${{ inputs.netlify_site_id }}
      run: netlify deploy ${{ env.deploy_flags }} --dir ${{ inputs.path }}
      shell: bash

    - name: Add url comment
      if: ${{ github.event.action == 'opened' || github.event.action == 'reopened' }}
      uses: peter-evans/create-or-update-comment@v5
      with:
        token: ${{ inputs.pat_github_pr }}
        issue-number: ${{ github.event.pull_request.number }}
        body: |
          [Preview](https://${{ env.pr_id }}--${{ inputs.netlify_url }})
